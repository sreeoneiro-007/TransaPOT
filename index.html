<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransacPOT v2 - Dashboard & Entry</title>
  <script src="https://jsdelivr.net"></script>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 16px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    h1 { font-size: 24px; color: var(--primary-dark); }
    .status-badge { background: #d1fae5; color: var(--primary-dark); padding: 6px 12px; border-radius: 9999px; font-size: 14px; font-weight: 600; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 24px; }
    @media (min-width: 768px) { .grid { grid-template-columns: 1fr 2fr; } }
    .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
    .metrics-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .metric-box { background: #f9fafb; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    .metric-val { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 4px; }
    .metric-lbl { font-size: 12px; color: var(--text-light); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    .date-filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: var(--primary-dark); }
    .table-wrapper { overflow-x: auto; margin-top: 16px; max-height: 400px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th { background: #f9fafb; padding: 12px; font-weight: 600; border-bottom: 2px solid var(--border); color: var(--text-light); position: sticky; top: 0; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr:hover { background: #fcfdfd; }
    .chart-container { position: relative; height: 220px; width: 100%; }
    .alert { padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; display: none; }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>TransacPOT v2</h1>
      <div id="connectionStatus" class="status-badge">Checking Connection...</div>
    </header>

    <div id="alertBox" class="alert"></div>

    <div class="grid">
      <!-- INPUT FORM CARD -->
      <div class="card">
        <div class="card-title">Log Transaction</div>
        <form id="txForm">
          <div class="form-group">
            <label for="txName">Name / Title</label>
            <input type="text" id="txName" placeholder="e.g., Office Supplies" required>
          </div>
          <div class="form-group">
            <label for="txAmount">Amount (INR)</label>
            <input type="number" id="txAmount" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label for="txDate">Transaction Date</label>
            <input type="date" id="txDate" required>
          </div>
          <div class="form-group">
            <label for="txDesc">Category / Description</label>
            <input type="text" id="txDesc" placeholder="e.g., Food, Travel, Rent">
          </div>
          <button type="submit" id="submitBtn">Submit Transaction</button>
        </form>
      </div>

      <!-- ANALYTICS DASHBOARD CARD -->
      <div class="card">
        <div class="card-title">Collection Analytics Dashboard</div>
        
        <div class="metrics-strip">
          <div class="metric-box">
            <div class="metric-lbl">Today</div>
            <div id="metricToday" class="metric-val">₹0</div>
          </div>
          <div class="metric-box">
            <div class="metric-lbl">This Month</div>
            <div id="metricMonth" class="metric-val">₹0</div>
          </div>
          <div class="metric-box">
            <div class="metric-lbl">Total</div>
            <div id="metricTotal" class="metric-val">₹0</div>
          </div>
        </div>

        <div class="date-filter-row">
          <div>
            <label for="filterStart">Start Date</label>
            <input type="date" id="filterStart">
          </div>
          <div>
            <label for="filterEnd">End Date</label>
            <input type="date" id="filterEnd">
          </div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr; gap: 16px; margin-bottom: 0;">
          <div class="chart-container">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- TRANSACTION HISTORY CARD -->
    <div class="card">
      <div class="card-title">Recent Records Table</div>
      <div class="table-wrapper">
        <table id="historyTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Category</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="4" style="text-align:center; color:var(--text-light);">No data loaded.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- LINK THE EXTERNAL LOGIC ENGINE FILE HERE -->
  <script src="app.js"></script>
</body>
</html>
